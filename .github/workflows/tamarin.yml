name: Security Model Verification

on:
  push:
    paths:
      - 'security/**/*.spthy'
  pull_request:
    paths:
      - 'security/**/*.spthy'
  workflow_dispatch:

jobs:
  tamarin-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Tamarin image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.tamarin
          platforms: linux/amd64
          push: false
          load: true
          tags: tamarin-prover:1.12.0-amd64

      - name: Verify security model
        run: |
          docker run --rm \
            -e LANG=C.UTF-8 \
            -v $(pwd)/security:/security \
            -w /security \
            tamarin-prover:1.12.0-amd64 \
            --prove /security/p2p_transport.spthy

      - name: Upload proof logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tamarin-proof-logs
          path: |
            security/**/*.spthy
          retention-days: 30