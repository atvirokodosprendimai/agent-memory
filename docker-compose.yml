services:
  ipfs:
    image: docker.io/ipfs/kubo:latest
    restart: unless-stopped
    ports:
      - "5001:5001"
      - "4001:4001"
      - "4001:4001/udp"
    volumes:
      - ipfs-data:/data/ipfs
    healthcheck:
      test: ["CMD", "wget", "-q", "--post-data", "", "-O", "/dev/null", "http://localhost:5001/api/v0/id"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  agent-memory:
    image: agent-memory:latest
    restart: on-failure
    environment:
      - AGENT_MEMORY_SECRET=${AGENT_MEMORY_SECRET}
      - AGENT_MEMORY_IPFS_ADDR=http://ipfs:5001
    volumes:
      - agent-memory-config:/root/.config/agent-memory
    depends_on:
      ipfs:
        condition: service_healthy
    profiles:
      - run

volumes:
  ipfs-data:
  agent-memory-config:
